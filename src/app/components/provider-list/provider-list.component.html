<h2>Providers</h2>
<div *ngFor="let provider of items">
    <a [title]="provider.name + ' details'" [routerLink]="['/provider', provider.id]">
        {{ provider.name }}
    </a>
</div>
<div *ngFor="let provider2 of items">
    <a [title]="provider2.name + ' details'" [routerLink]="['/provider2', provider2.id]">
        {{ provider2.name }}
    </a>
</div>
